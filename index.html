<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MD2WeChat — Markdown 转公众号排版</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f7; color: #1d1d1f; height: 100vh; display: flex; flex-direction: column; }

/* Toolbar */
.toolbar { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 10px 20px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; z-index: 10; }
.toolbar label { font-size: 13px; color: #86868b; white-space: nowrap; }
.toolbar select, .toolbar input[type="range"] { font-size: 13px; border: 1px solid #d2d2d7; border-radius: 6px; padding: 4px 8px; background: #fff; outline: none; }
.toolbar select:focus, .toolbar input:focus { border-color: #0071e3; }
.toolbar input[type="color"] { width: 28px; height: 28px; border: 1px solid #d2d2d7; border-radius: 6px; padding: 2px; cursor: pointer; background: #fff; }
.toolbar input[type="range"] { width: 80px; }
.toolbar .group { display: flex; align-items: center; gap: 6px; }
.toolbar .spacer { flex: 1; }
.toolbar .val { font-size: 12px; color: #86868b; min-width: 32px; }

#copyBtn { background: #0071e3; color: #fff; border: none; border-radius: 8px; padding: 8px 18px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
#copyBtn:hover { background: #0077ed; }
#copyBtn:active { transform: scale(0.97); }
#copyBtn.copied { background: #30d158; }

/* Main */
.main { flex: 1; display: flex; overflow: hidden; }
.editor-pane { width: 50%; border-right: 1px solid #e5e5e5; display: flex; flex-direction: column; }
.preview-pane { width: 50%; display: flex; flex-direction: column; background: #fff; }
.pane-header { padding: 8px 16px; font-size: 12px; font-weight: 600; color: #86868b; text-transform: uppercase; letter-spacing: 0.5px; background: #fafafa; border-bottom: 1px solid #e5e5e5; }
#editor { flex: 1; width: 100%; border: none; outline: none; resize: none; padding: 16px; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 14px; line-height: 1.6; background: #fafafa; color: #1d1d1f; tab-size: 4; }
#preview { flex: 1; overflow-y: auto; padding: 20px 24px; }
</style>
</head>
<body>

<div class="toolbar">
  <div class="group">
    <label>主题</label>
    <select id="themeSelect">
      <option value="simple">简约</option>
      <option value="tech">科技</option>
      <option value="literary">文艺</option>
      <option value="business">商务</option>
    </select>
  </div>
  <div class="group">
    <label>字号</label>
    <input type="range" id="fontSize" min="14" max="20" value="16">
    <span class="val" id="fontSizeVal">16px</span>
  </div>
  <div class="group">
    <label>行距</label>
    <input type="range" id="lineHeight" min="14" max="22" value="17">
    <span class="val" id="lineHeightVal">1.7</span>
  </div>
  <div class="group">
    <label>主题色</label>
    <input type="color" id="themeColor" value="#0071e3">
  </div>
  <div class="group">
    <label>代码背景</label>
    <input type="color" id="codeBg" value="#f5f5f7">
  </div>
  <div class="group">
    <label>代码文字</label>
    <input type="color" id="codeFg" value="#1d1d1f">
  </div>
  <div class="spacer"></div>
  <button id="copyBtn">📋 复制到公众号</button>
</div>

<div class="main">
  <div class="editor-pane">
    <div class="pane-header">Markdown</div>
    <textarea id="editor" spellcheck="false"></textarea>
  </div>
  <div class="preview-pane">
    <div class="pane-header">预览</div>
    <div id="preview"></div>
  </div>
</div>

</script>

<script>
// ===== Themes =====
const themes = {
  simple: {
    name: '简约',
    titleColor: '#1d1d1f',
    textColor: '#333',
    bgColor: '#fff',
    linkColor: '#0071e3',
    blockquoteBorder: '#d2d2d7',
    blockquoteBg: '#f9f9f9',
    blockquoteColor: '#666',
    codeBg: '#f5f5f7',
    codeFg: '#1d1d1f',
    inlineCodeBg: '#f0f0f2',
    inlineCodeFg: '#e8453c',
    tableBorder: '#e5e5e5',
    tableHeaderBg: '#f5f5f7',
    hrColor: '#e5e5e5',
    themeColor: '#0071e3'
  },
  tech: {
    name: '科技',
    titleColor: '#0a84ff',
    textColor: '#333',
    bgColor: '#fff',
    linkColor: '#0a84ff',
    blockquoteBorder: '#0a84ff',
    blockquoteBg: '#f0f7ff',
    blockquoteColor: '#555',
    codeBg: '#1e1e2e',
    codeFg: '#cdd6f4',
    inlineCodeBg: '#e8f0fe',
    inlineCodeFg: '#0a84ff',
    tableBorder: '#cce0ff',
    tableHeaderBg: '#e8f0fe',
    hrColor: '#cce0ff',
    themeColor: '#0a84ff'
  },
  literary: {
    name: '文艺',
    titleColor: '#8b5e3c',
    textColor: '#444',
    bgColor: '#fff',
    linkColor: '#b8860b',
    blockquoteBorder: '#d4a574',
    blockquoteBg: '#fdf8f0',
    blockquoteColor: '#6b5b4f',
    codeBg: '#faf6f0',
    codeFg: '#5d4e37',
    inlineCodeBg: '#f5ede3',
    inlineCodeFg: '#8b5e3c',
    tableBorder: '#e0d5c5',
    tableHeaderBg: '#f5ede3',
    hrColor: '#e0d5c5',
    themeColor: '#8b5e3c'
  },
  business: {
    name: '商务',
    titleColor: '#1a365d',
    textColor: '#2d3748',
    bgColor: '#fff',
    linkColor: '#2b6cb0',
    blockquoteBorder: '#2b6cb0',
    blockquoteBg: '#f0f4f8',
    blockquoteColor: '#4a5568',
    codeBg: '#edf2f7',
    codeFg: '#2d3748',
    inlineCodeBg: '#e2e8f0',
    inlineCodeFg: '#1a365d',
    tableBorder: '#cbd5e0',
    tableHeaderBg: '#edf2f7',
    hrColor: '#cbd5e0',
    themeColor: '#1a365d'
  }
};

// ===== Sample Article =====
const sampleMd = `# MD2WeChat 使用指南

## 快速开始

这是一个 **Markdown 转公众号排版** 工具。在左侧编辑 Markdown，右侧实时预览公众号效果。

### 功能特色

支持 *斜体*、**加粗**、***粗斜体*** 和 ~~删除线~~ 等基本格式。

## 列表示例

### 无序列表

- 📝 实时预览排版效果
- 🎨 四套精选主题
- ⚙️ 字号、行距、配色微调
- 📋 一键复制到公众号

### 有序列表

1. 在左栏输入 Markdown
2. 右栏实时查看效果
3. 选择合适的主题
4. 点击复制按钮
   - 粘贴到公众号后台
   - 格式完整保留

## 引用块

> 好的工具让创作回归内容本身。
> 
> — MD2WeChat

## 代码展示

行内代码：使用 \`marked.js\` 解析 Markdown。

代码块：

\`\`\`
function hello() {
  console.log("Hello, WeChat!");
  return "排版完成 ✅";
}
\`\`\`

## 表格

| 功能 | 说明 | 状态 |
|:-----|:-----|:----:|
| Markdown 解析 | 支持常用语法 | ✅ |
| 主题切换 | 4 套预设主题 | ✅ |
| 样式微调 | 字号/行距/配色 | ✅ |
| 一键复制 | 富文本到剪贴板 | ✅ |

## 图片

![示例图片](https://via.placeholder.com/600x200/f5f5f7/999?text=MD2WeChat+Preview)

## 链接

更多信息请访问 [GitHub 仓库](https://github.com/labradorsedsota/md-wechat-formatter)。

---

*使用愉快！✨*
`;

// ===== State =====
const LS_KEY = 'md2wechat';
function loadState() {
  try {
    return JSON.parse(localStorage.getItem(LS_KEY) || '{}');
  } catch { return {}; }
}
function saveState(patch) {
  const s = { ...loadState(), ...patch };
  localStorage.setItem(LS_KEY, JSON.stringify(s));
}

// ===== DOM =====
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');
const themeSelect = document.getElementById('themeSelect');
const fontSizeInput = document.getElementById('fontSize');
const fontSizeVal = document.getElementById('fontSizeVal');
const lineHeightInput = document.getElementById('lineHeight');
const lineHeightVal = document.getElementById('lineHeightVal');
const themeColorInput = document.getElementById('themeColor');
const codeBgInput = document.getElementById('codeBg');
const codeFgInput = document.getElementById('codeFg');
const copyBtn = document.getElementById('copyBtn');

// ===== Init =====
const state = loadState();
editor.value = state.content != null ? state.content : sampleMd;
themeSelect.value = state.theme || 'simple';
fontSizeInput.value = state.fontSize || 16;
lineHeightInput.value = Math.round((state.lineHeight || 1.75) * 10);
themeColorInput.value = state.themeColor || themes[themeSelect.value].themeColor;
codeBgInput.value = state.codeBg || themes[themeSelect.value].codeBg;
codeFgInput.value = state.codeFg || themes[themeSelect.value].codeFg;

function updateSliderLabels() {
  fontSizeVal.textContent = fontSizeInput.value + 'px';
  lineHeightVal.textContent = (lineHeightInput.value / 10).toFixed(1);
}
updateSliderLabels();

// ===== Render =====
function getActiveTheme() {
  const base = themes[themeSelect.value] || themes.simple;
  return {
    ...base,
    themeColor: themeColorInput.value,
    codeBg: codeBgInput.value,
    codeFg: codeFgInput.value
  };
}

function renderPreview() {
  const md = editor.value;
  const rawHtml = marked.parse(md, { gfm: true, breaks: false });
  const t = getActiveTheme();
  const fs = fontSizeInput.value + 'px';
  const lh = (lineHeightInput.value / 10).toFixed(2);

  // Wrap in a container div, then post-process to add inline styles
  const wrapper = document.createElement('div');
  wrapper.innerHTML = rawHtml;

  // Apply inline styles to all elements for WeChat compatibility
  applyInlineStyles(wrapper, t, fs, lh);

  preview.innerHTML = '';
  // Append children directly (not wrapped in extra div)
  while (wrapper.firstChild) {
    preview.appendChild(wrapper.firstChild);
  }
}

function applyInlineStyles(container, t, fs, lh) {
  // Paragraphs
  container.querySelectorAll('p').forEach(el => {
    el.setAttribute('style', `margin: 0; padding: 0; margin-bottom: 1.2em; font-size: ${fs}; line-height: ${lh}; color: ${t.textColor};`);
  });

  // Headings
  const headingSizes = { H1: '1.8em', H2: '1.5em', H3: '1.3em', H4: '1.15em', H5: '1.05em', H6: '1em' };
  const headingWeights = { H1: '700', H2: '700', H3: '600', H4: '600', H5: '600', H6: '600' };
  Object.keys(headingSizes).forEach(tag => {
    container.querySelectorAll(tag.toLowerCase()).forEach(el => {
      el.setAttribute('style', `margin: 0; padding: 0; margin-top: 1.5em; margin-bottom: 0.6em; font-size: ${headingSizes[tag]}; font-weight: ${headingWeights[tag]}; color: ${t.themeColor}; line-height: 1.4;`);
    });
  });

  // Strong
  container.querySelectorAll('strong').forEach(el => {
    el.setAttribute('style', `font-weight: 700; color: ${t.titleColor};`);
  });

  // Em
  container.querySelectorAll('em').forEach(el => {
    el.setAttribute('style', 'font-style: italic;');
  });

  // Del
  container.querySelectorAll('del').forEach(el => {
    el.setAttribute('style', 'text-decoration: line-through; color: #999;');
  });

  // Links
  container.querySelectorAll('a').forEach(el => {
    el.setAttribute('style', `color: ${t.themeColor}; text-decoration: none; border-bottom: 1px solid ${t.themeColor};`);
  });

  // Blockquotes
  container.querySelectorAll('blockquote').forEach(el => {
    el.setAttribute('style', `margin: 0; padding: 12px 16px; margin-bottom: 1.2em; border-left: 4px solid ${t.themeColor}; background: ${t.blockquoteBg}; color: ${t.blockquoteColor}; font-size: ${fs}; line-height: ${lh};`);
    // Remove margin from last p in blockquote
    const lastP = el.querySelector('p:last-child');
    if (lastP) {
      lastP.style.marginBottom = '0';
    }
  });

  // Code blocks (pre > code)
  container.querySelectorAll('pre').forEach(el => {
    el.setAttribute('style', `margin: 0; padding: 16px; margin-bottom: 1.2em; background: ${t.codeBg}; color: ${t.codeFg}; border-radius: 6px; overflow-x: auto; font-size: 13px; line-height: 1.6;`);
    const code = el.querySelector('code');
    if (code) {
      code.setAttribute('style', `background: none; padding: 0; color: inherit; font-family: 'SF Mono', 'Fira Code', Consolas, monospace; font-size: inherit; white-space: pre-wrap; word-break: break-all;`);
    }
  });

  // Inline code
  container.querySelectorAll('code').forEach(el => {
    if (el.parentElement && el.parentElement.tagName === 'PRE') return;
    el.setAttribute('style', `background: ${t.inlineCodeBg}; color: ${t.inlineCodeFg}; padding: 2px 6px; border-radius: 4px; font-family: 'SF Mono', 'Fira Code', Consolas, monospace; font-size: 0.9em;`);
  });

  // Lists
  container.querySelectorAll('ul').forEach(el => {
    el.setAttribute('style', `margin: 0; padding: 0; padding-left: 2em; margin-bottom: 1.2em; font-size: ${fs}; line-height: ${lh}; color: ${t.textColor};`);
  });
  container.querySelectorAll('ol').forEach(el => {
    el.setAttribute('style', `margin: 0; padding: 0; padding-left: 2em; margin-bottom: 1.2em; font-size: ${fs}; line-height: ${lh}; color: ${t.textColor};`);
  });
  container.querySelectorAll('li').forEach(el => {
    el.setAttribute('style', `margin-bottom: 0.4em; line-height: ${lh};`);
  });

  // Tables
  container.querySelectorAll('table').forEach(el => {
    el.setAttribute('style', `width: 100%; border-collapse: collapse; margin-bottom: 1.2em; font-size: ${fs};`);
  });
  container.querySelectorAll('thead').forEach(el => {
    el.setAttribute('style', `background: ${t.tableHeaderBg};`);
  });
  container.querySelectorAll('th').forEach(el => {
    const existingAlign = el.getAttribute('align') || 'left';
    el.setAttribute('style', `padding: 8px 12px; border: 1px solid ${t.tableBorder}; font-weight: 600; text-align: ${existingAlign}; color: ${t.titleColor};`);
  });
  container.querySelectorAll('td').forEach(el => {
    const existingAlign = el.getAttribute('align') || 'left';
    el.setAttribute('style', `padding: 8px 12px; border: 1px solid ${t.tableBorder}; text-align: ${existingAlign}; color: ${t.textColor};`);
  });

  // HR
  container.querySelectorAll('hr').forEach(el => {
    el.setAttribute('style', `border: none; border-top: 1px solid ${t.hrColor}; margin: 1.5em 0;`);
  });

  // Images
  container.querySelectorAll('img').forEach(el => {
    el.setAttribute('style', 'max-width: 100%; height: auto; border-radius: 4px; margin: 0.5em 0; display: block;');
  });
}

// ===== Debounce render =====
let renderTimer;
function scheduleRender() {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(renderPreview, 150);
}

// ===== Events =====
editor.addEventListener('input', () => {
  saveState({ content: editor.value });
  scheduleRender();
});

// Tab support in editor
editor.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = editor.selectionStart;
    const end = editor.selectionEnd;
    editor.value = editor.value.substring(0, start) + '    ' + editor.value.substring(end);
    editor.selectionStart = editor.selectionEnd = start + 4;
    saveState({ content: editor.value });
    scheduleRender();
  }
});

themeSelect.addEventListener('change', () => {
  const t = themes[themeSelect.value];
  themeColorInput.value = t.themeColor;
  codeBgInput.value = t.codeBg;
  codeFgInput.value = t.codeFg;
  saveState({ theme: themeSelect.value, themeColor: t.themeColor, codeBg: t.codeBg, codeFg: t.codeFg });
  renderPreview();
});

fontSizeInput.addEventListener('input', () => {
  updateSliderLabels();
  saveState({ fontSize: parseInt(fontSizeInput.value) });
  renderPreview();
});

lineHeightInput.addEventListener('input', () => {
  updateSliderLabels();
  saveState({ lineHeight: parseFloat((lineHeightInput.value / 10).toFixed(2)) });
  renderPreview();
});

themeColorInput.addEventListener('input', () => {
  saveState({ themeColor: themeColorInput.value });
  renderPreview();
});

codeBgInput.addEventListener('input', () => {
  saveState({ codeBg: codeBgInput.value });
  renderPreview();
});

codeFgInput.addEventListener('input', () => {
  saveState({ codeFg: codeFgInput.value });
  renderPreview();
});

// ===== Copy =====
copyBtn.addEventListener('click', async () => {
  try {
    // Build a standalone HTML string with all inline styles
    const t = getActiveTheme();
    const fs = fontSizeInput.value + 'px';
    const lh = (lineHeightInput.value / 10).toFixed(2);

    const rawHtml = marked.parse(editor.value, { gfm: true, breaks: false });
    const wrapper = document.createElement('div');
    wrapper.innerHTML = rawHtml;
    applyInlineStyles(wrapper, t, fs, lh);

    const htmlContent = wrapper.innerHTML;

    await navigator.clipboard.write([
      new ClipboardItem({
        'text/html': new Blob([htmlContent], { type: 'text/html' }),
        'text/plain': new Blob([editor.value], { type: 'text/plain' })
      })
    ]);

    copyBtn.textContent = '已复制 ✓';
    copyBtn.classList.add('copied');
    setTimeout(() => {
      copyBtn.textContent = '📋 复制到公众号';
      copyBtn.classList.remove('copied');
    }, 2000);
  } catch (err) {
    console.error('Copy failed:', err);
    // Fallback
    try {
      const sel = window.getSelection();
      const range = document.createRange();
      range.selectNodeContents(preview);
      sel.removeAllRanges();
      sel.addRange(range);
      document.execCommand('copy');
      sel.removeAllRanges();
      copyBtn.textContent = '已复制 ✓';
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.textContent = '📋 复制到公众号';
        copyBtn.classList.remove('copied');
      }, 2000);
    } catch (e2) {
      copyBtn.textContent = '复制失败 ✗';
      setTimeout(() => { copyBtn.textContent = '📋 复制到公众号'; }, 2000);
    }
  }
});

// ===== Initial render =====
renderPreview();
</script>
</body>
</html>
